name: Daily stock report

on:
  schedule:
    # 07:17 UTC = 16:17 KST, weekdays (Mon-Fri)
    # 정각을 피해 GitHub Actions 스케줄 누락 가능성을 줄임
    - cron: "17 7 * * 1-5"
  workflow_dispatch:
    inputs:
      tickers:
        description: "Tickers separated by space (default: 360750 133690)"
        required: false
        default: ""

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py ${{ inputs.tickers }}

      - name: Build site data
        run: python build_site.py ${{ inputs.tickers }}

      - name: Commit site data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: update site data"
            git push
          fi
